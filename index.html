*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}

#app{min-height:100vh}

.script-font{font-family:'Great Vibes',Georgia,serif}

/* Layout */
.app-header{background:#fff;border-bottom:1px solid #E5E5E0;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(16px,4vw,48px);position:sticky;top:0;z-index:200}
.header-left{display:flex;align-items:center;gap:12px}
.header-right{display:flex;align-items:center;gap:10px}
.divider{width:1px;height:22px;background:#E5E5E0}
.app-body{display:flex;flex:1;min-height:calc(100vh - 60px)}
.sidebar{width:210px;flex-shrink:0;background:#fff;border-right:1px solid #E5E5E0;padding:16px 0;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto}
.sidebar-btn{display:block;width:100%;padding:11px 24px;border:none;background:none;cursor:pointer;font-size:13px;color:#6A6A64;text-align:left;border-left:3px solid transparent;font-family:inherit;transition:all .15s}
.sidebar-btn:hover{color:#1C1C1C;background:#F8F8F6}
.sidebar-btn.active{color:#1C1C1C;font-weight:600;border-left-color:#1C1C1C;background:#F8F8F6}
.content{flex:1;min-width:0;overflow-y:auto}
.content-inner{max-width:1060px;margin:0 auto;padding:30px clamp(16px,3vw,36px)}

/* Mobile tabs */
.tab-bar{display:none;background:#fff;border-bottom:1px solid #E5E5E0;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-bar-inner{display:flex;min-width:max-content}
.tab-btn{padding:12px 18px;border:none;background:none;cursor:pointer;font-size:12px;color:#8A8A82;border-bottom:2px solid transparent;font-family:inherit;white-space:nowrap;font-weight:500}
.tab-btn.active{color:#1C1C1C;font-weight:700;border-bottom-color:#1C1C1C}

/* Login */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:#F8F8F6}
.login-box{width:100%;max-width:420px}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo .big{font-size:42px;color:#1C1C1C;line-height:1.1}
.login-logo .sub{font-size:10px;color:#aaa;letter-spacing:.28em;text-transform:uppercase;margin-top:6px}
.login-card{background:#fff;border-radius:14px;border:1px solid #E5E5E0;overflow:hidden;box-shadow:0 6px 32px rgba(0,0,0,.09)}
.login-tabs{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid #E5E5E0}
.login-tab{padding:14px;border:none;background:#F8F8F6;color:#8A8A82;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;border-bottom:2px solid transparent;transition:all .15s}
.login-tab.active{background:#fff;color:#1C1C1C;font-weight:700;border-bottom-color:#1C1C1C}
.login-body{padding:24px}
.login-demo{margin-top:14px;background:#fff;border-radius:8px;padding:12px 16px;border:1px solid #E5E5E0;font-size:12px;color:#6A6A64}
.login-demo-label{font-size:10px;color:#8A8A82;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;font-weight:600}

/* Forms */
.field{margin-bottom:14px}
.field label,.lbl{display:block;font-size:10px;font-weight:700;color:#8A8A82;margin-bottom:5px;letter-spacing:.1em;text-transform:uppercase}
input,select,textarea{width:100%;padding:9px 12px;border:1.5px solid #E5E5E0;border-radius:7px;font-size:13px;font-family:inherit;color:#1C1C1C;background:#fff;outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:#1C1C1C}
textarea{resize:vertical;min-height:60px}
input[type=color]{padding:2px;height:38px;cursor:pointer}
input[type=checkbox]{width:auto;margin-right:6px}
input[type=date]{color:#1C1C1C}

/* Buttons */
.btn{padding:9px 20px;border:none;border-radius:7px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;transition:all .15s}
.btn-dark{background:#1C1C1C;color:#fff}
.btn-dark:hover{background:#333}
.btn-outline{background:#fff;color:#1C1C1C;border:1.5px solid #DEDED8}
.btn-outline:hover{background:#F8F8F6}
.btn-sm{padding:5px 12px;font-size:11px}
.btn-full{width:100%;padding:12px}
.btn-nude{background:none;border:none;cursor:pointer;font-family:inherit;font-size:12px;color:#aaa}

/* Cards */
.card{background:#fff;border-radius:10px;border:1px solid #E5E5E0;padding:20px;margin-bottom:16px}
.card-dark{background:#1C1C1C;border-radius:10px;padding:16px 20px;margin-bottom:16px}

/* Dashboard grid */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
.stat-card{background:#fff;border-radius:10px;border:1px solid #E5E5E0;padding:18px 16px}
.stat-val{font-size:clamp(20px,3vw,28px);font-weight:400;color:#1C1C1C}
.stat-label{font-size:11px;color:#8A8A82;margin-top:3px}
.clients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
.client-card{background:#fff;border-radius:12px;border:1px solid #E5E5E0;overflow:hidden;cursor:pointer;transition:box-shadow .2s}
.client-card:hover{box-shadow:0 8px 28px rgba(0,0,0,.1)}
.client-card-top{background:#1C1C1C;padding:16px 18px;position:relative}
.client-name{font-size:22px;color:#fff;line-height:1.2}
.client-venue{font-size:12px;color:#888;margin-top:2px}
.client-days-badge{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.12);border-radius:14px;padding:3px 10px;font-size:11px;color:#ccc}
.client-card-body{padding:14px 18px}

/* Toggle */
.toggle{width:38px;height:20px;border-radius:10px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;border:none}
.toggle-knob{position:absolute;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}

/* Status pills */
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.pill-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Progress bar */
.progress-wrap{background:#F0F0EC;border-radius:5px;height:7px;overflow:hidden}
.progress-bar{height:7px;border-radius:5px;transition:width .5s}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-box{background:#fff;border-radius:12px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}

.modal-head{padding:20px 22px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #F0F0EC;position:sticky;top:0;background:#fff;z-index:1}
.modal-title{font-size:18px;font-weight:400;color:#1C1C1C}
.modal-body{padding:18px 22px 22px}
.modal-close{background:none;border:none;cursor:pointer;color:#aaa;font-size:20px;line-height:1;padding:2px}

.vendor-card-head{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #E5E5E0}

.rd-header-grid{display:grid;grid-template-columns:70px 100px 1fr 40px;gap:6px;padding:5px 0;border-bottom:1px solid #F0F0EC;margin-bottom:4px}

/* Masonry */
.masonry{columns:4 180px;gap:16px}
.masonry-item{break-inside:avoid;margin-bottom:16px;border-radius:10px;overflow:hidden;border:1px solid #E5E5E0;cursor:pointer;position:relative}

/* Avatar */

/* Grid helpers */

.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.flex{display:flex;align-items:center}

.flex-between{justify-content:space-between}

.gap-12{gap:12px}

.text-sm{font-size:12px}

.text-dark{color:#1C1C1C}
.italic{font-style:italic}
.bold{font-weight:600}
.w-full{width:100%}
.overflow-x{overflow-x:auto}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#D8D4CE;border-radius:3px}

/* Animations */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeUp .18s ease}

/* Responsive */
@media(max-width:768px){

  .masonry{columns:2 130px}
  .grid-2,.grid-3{grid-template-columns:1fr}
  .hide-sm{display:none!important}

@media(min-width:769px){

function _setupFirebaseListeners(){
  if(!_fdb) return;
  _fdb.ref('jmb/admins').on('value', snap => {
    const v = snap.val();
    if(!v) return;
    if(JSON.stringify(v) !== JSON.stringify(STATE.admins)){
      STATE.admins = v;
      lsSet('admins', v);
      if(STATE.view !== 'login') render();
    }
  });

    const v = snap.val();

    if(JSON.stringify(v) !== JSON.stringify(STATE.clients)){
      STATE.clients = v;
      lsSet('clients', v);
      if(STATE.activeClientId){

      if(STATE.view !== 'login') render();
    }

  _fdb.ref('jmb/admins').once('value').then(s=>{ if(!s.val()) _fdb.ref('jmb/admins').set(STATE.admins); });
  _fdb.ref('jmb/clients').once('value').then(s=>{ if(!s.val()) _fdb.ref('jmb/clients').set(STATE.clients); });
}

function lsSet(k,v){try{localStorage.setItem('jmb_'+k,JSON.stringify(v));}catch(e){}}

// ── Helpers ───────────────────────────────────────────────────────────────────
function uid(){return 'id'+Date.now()+Math.random().toString(36).slice(2,6);}
function fmtDate(d){if(!d)return '';try{return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}catch(e){return d;}}
function daysTo(d){return Math.ceil((new Date(d)-new Date())/86400000);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getPaymentsTotal(payments){return (payments||[]).reduce((s,p)=>s+(parseFloat(p.amount)||0),0);}
function fmt(v){return '€'+(v||0).toLocaleString('es-ES',{minimumFractionDigits:2});}

// ── Event delegation ──────────────────────────────────────────────────────────
document.addEventListener('click',e=>{
  const t=e.target.closest('[data-action]');
  if(!t)return;
  const a=t.dataset.action;
  const d={...t.dataset};
  handleAction(a,d,e,t);
});
document.addEventListener('change',e=>{
  const t=e.target.closest('[data-change]');
  if(t)handleChange(t.dataset.change,t,e);
});
document.addEventListener('input',e=>{
  const t=e.target.closest('[data-input]');
  if(t)handleInput(t.dataset.input,t,e);
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&STATE.modal){closeModal();render();}
});
document.addEventListener('close-modal',()=>{
  if(STATE.modal){closeModal();render();}
});

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  if(STATE.modal){
    // Render main + overlay
    app.innerHTML=renderMain()+renderModal();
  } else {
    app.innerHTML=renderMain();
  }
  // Apply web fonts if loaded
  document.querySelectorAll('.script-font').forEach(el=>{
    if(document.fonts&&document.fonts.check('1em Great Vibes'))el.style.fontFamily="'Great Vibes',cursive";
  });
  document.querySelectorAll('.serif-font').forEach(el=>{
    if(document.fonts&&document.fonts.check('1em Cormorant Garamond'))el.style.fontFamily="'Cormorant Garamond',serif";
  });
}

  return '';
}

    const pend='€'+STATE.clients.reduce((a,c)=>a+Math.max(0,(c.budget||0)-(c.budgetPaid||0)),0).toLocaleString('es-ES',{maximumFractionDigits:0});
    statsHtml=`<div class="stats-row mb-20">
      ${[['Clients',total],['Weddings 2025',y25],['Revenue',rev],['Pending',pend]].map(([l,v])=>`<div class="stat-card"><div class="serif-font stat-val">${v}</div><div class="stat-label">${l}</div></div>`).join('')}
    </div>`;
  }

  const cardsHtml=myClients.length===0?`<div class="card" style="text-align:center;padding:48px"><div style="font-size:36px;margin-bottom:12px">💍</div><div class="serif-font" style="font-size:22px;color:#aaa;font-weight:300">No weddings assigned yet</div></div>`:
  `<div class="clients-grid">${myClients.map(c=>{
    const lead=STATE.admins.find(a=>a.id===c.leadId);
    const tv=(c.vendors||[]).length,cv=(c.vendors||[]).filter(v=>v.confirmed).length,pct=tv?Math.round(cv/tv*100):0;
    const days=daysTo(c.date);
    return `<div class="client-card" data-action="open-client" data-id="${esc(c.id)}">
      <div class="client-card-top">
        <div class="script-font client-name">${esc(c.bride)} & ${esc(c.groom)}</div>
        <div class="client-venue">${esc(c.venue)}${c.archived?` <span style="font-size:9px;background:rgba(255,255,255,0.15);padding:1px 6px;border-radius:8px;color:#ccc">Archived</span>`:''}</div>
        <div class="client-days-badge">${days>0?days+'d':days===0?'Today':'Past'}</div>
      </div>
      <div class="client-card-body">
        <div class="flex flex-between text-sm text-gray mb-8">
          <span>${fmtDate(c.date)}</span>
          <span>${c.guests&&c.guests.adults?c.guests.adults+' guests':''}</span>
        </div>
        ${lead?`<div class="flex flex-gap mb-12" style="background:#F8F8F6;border:1px solid #E5E5E0;border-radius:8px;padding:6px 10px">
          <div class="avatar" style="width:20px;height:20px;background:${avatarBg(lead.name)};font-size:9px">${avatarLetters(lead.name)}</div>
          <span style="font-size:11px;color:#555">${esc(lead.name)}</span>
          <span style="font-size:10px;color:#B5977A;margin-left:auto">Lead</span>
        </div>`:''}
        ${tv>0?`<div class="flex flex-between" style="font-size:11px;color:#8A8A82;margin-bottom:5px"><span>Vendors confirmed</span><span style="color:${pct>=100?'#16a34a':pct>=50?'#d97706':'#dc2626'};font-weight:700">${cv}/${tv}</span></div>
        <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%;background:${pct>=100?'#16a34a':'#1C1C1C'}"></div></div>`:''}
      ${isOwner?`<div class="flex flex-gap" style="margin-top:10px;padding-top:10px;border-top:1px solid #F0F0EC" onclick="event.stopPropagation()">
          <button class="btn btn-outline btn-sm" style="flex:1;font-size:11px" data-action="${c.archived?'unarchive-client':'archive-client'}" data-id="${c.id}">${c.archived?'📂 Unarchive':'📁 Archive'}</button>
          <button class="btn btn-outline btn-sm" style="color:#dc2626;border-color:#fca5a5;font-size:11px" data-action="confirm-delete-client" data-id="${c.id}">🗑 Delete</button>
        </div>`:''}
    </div>
    </div>`;
  }).join('')}</div>`;

  return `
<div style="display:flex;flex-direction:column;min-height:100vh">
  <header class="app-header">
    <div class="header-left">
      <span class="script-font" style="font-size:24px;color:#1C1C1C">Just Married</span>
      <div class="divider"></div>
      <span class="hide-sm text-xs text-gray" style="text-transform:uppercase;letter-spacing:.08em">${isOwner?'Dashboard':'My Weddings'}</span>
      <span style="font-size:10px;color:${_fbReady?'#16a34a':'#d97706'};background:${_fbReady?'#f0fdf4':'#fffbeb'};padding:2px 8px;border-radius:10px;border:1px solid ${_fbReady?'#86efac':'#fde68a'}">${_fbReady?'🟢 Synced':'🟡 Local'}</span>
    </div>
    <div class="header-right">
      <div class="avatar" style="width:30px;height:30px;background:${avatarBg(u.name)};font-size:11px">${avatarLetters(u.name)}</div>
      <span class="hide-sm text-sm text-gray">${esc(u.name)}</span>
      ${isOwner?`<button class="btn btn-outline btn-sm" data-action="go-team">Team</button>`:''}
      <button class="btn-nude" data-action="logout">Log out</button>
    </div>
  </header>
  <div class="content-inner" style="max-width:1200px;padding-top:32px">
    <div class="flex flex-between flex-wrap gap-10 mb-20">
      <div>
        <h1 class="serif-font section-title">${isOwner?'All Weddings':'My Weddings'}</h1>
        <p class="section-sub">${myClients.length} client${myClients.length!==1?'s':''}</p>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <button class="btn ${STATE._showArchived?'btn-dark':'btn-outline'} btn-sm" data-action="toggle-archived">
          ${STATE._showArchived?'📁 Archived':'📁 Show Archived'}
        </button>
        ${isOwner?`<button class="btn btn-dark" data-action="new-client">+ New Client</button>`:''}
      </div>

</div>`;
}

// ── CLIENT VIEW ───────────────────────────────────────────────────────────────
function renderClientView(){
  const cl=getClient();
  if(!cl)return renderDash();
  const isCouple=STATE.session.role==='couple';
  const isAdmin=!isCouple;
  const tabs=isCouple?ADMIN_TABS.filter(t=>(cl.visibleTabs||[]).includes(t.id)):ADMIN_TABS;
  const tab=STATE.activeTab;
  const lead=STATE.admins.find(a=>a.id===cl.leadId);
  const days=daysTo(cl.date);

  const sidebarHtml=`<nav class="sidebar">${tabs.map(t=>`<button class="sidebar-btn${tab===t.id?' active':''}" data-action="set-tab" data-tab="${t.id}">${t.label}</button>`).join('')}</nav>`;

  const tabBarHtml=`<div class="tab-bar"><div class="tab-bar-inner">${tabs.map(t=>`<button class="tab-btn${tab===t.id?' active':''}" data-action="set-tab" data-tab="${t.id}">${t.label}</button>`).join('')}</div></div>`;

  const headerLeft=isCouple?
    `<span class="script-font" style="font-size:24px;color:#1C1C1C">${esc(cl.bride)} & ${esc(cl.groom)}</span>`:
    `<button class="btn-nude" data-action="go-back" style="color:#1C1C1C;font-size:13px">&#8592; Back</button>
     <div class="divider"></div>
     <span class="script-font" style="font-size:22px;color:#1C1C1C">${esc(cl.bride)} & ${esc(cl.groom)}</span>
     <span class="hide-sm text-xs text-gray">${esc(cl.venue)}</span>`;

  const headerRight=`
    ${lead&&isAdmin?`<div class="flex flex-gap hide-sm"><div class="avatar" style="width:22px;height:22px;background:${avatarBg(lead.name)};font-size:9px">${avatarLetters(lead.name)}</div><span class="text-xs text-gray">${esc(lead.name)}</span></div>`:''}
    <div style="text-align:right;line-height:1">
      <div class="serif-font" style="font-size:22px;font-weight:400;color:#1C1C1C">${days>0?days:0}</div>
      <div style="font-size:9px;color:#8A8A82;letter-spacing:.1em;text-transform:uppercase">days</div>
    </div>
    <button class="btn-nude" data-action="logout">Log out</button>`;

  return `
<div style="display:flex;flex-direction:column;min-height:100vh">
  <header class="app-header">
    <div class="header-left">${headerLeft}</div>
    <div class="header-right">${headerRight}</div>
  </header>
  <div class="app-body">
    ${sidebarHtml}
    <div class="content">
      ${tabBarHtml}
      <div class="content-inner fade-in">
        ${renderTab(cl,tab,isAdmin)}
      </div>
    </div>
  </div>
</div>`;
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function renderTab(cl,tab,isAdmin){
  switch(tab){
    case 'roadmap':    return renderRoadmap(cl,isAdmin);
    case 'vendors':    return renderVendors(cl,isAdmin);
    case 'setup':      return renderSetup(cl,isAdmin);
    case 'rundown':    return renderRundown(cl,isAdmin);
    case 'design':     return renderDesign(cl,isAdmin);
    case 'moodboard':  return renderMoodboard(cl,isAdmin);
    case 'budget':     return renderBudget(cl,isAdmin);
    case 'family':     return renderFamily(cl,isAdmin);
    case 'inspection': return renderInspection(cl,isAdmin);
    default: return '';
  }
}

// ── ROADMAP ───────────────────────────────────────────────────────────────────
function renderRoadmap(cl,isAdmin){
  const visible=isAdmin?(cl.roadmap||[]):(cl.roadmap||[]).filter(r=>!r.adminOnly&&!(cl.hiddenRoadmapIds||[]).includes(r.id));
  const cats=RCATS.filter(c=>visible.some(r=>r.category===c));
  const counts={};Object.keys(STATUS).forEach(k=>counts[k]=visible.filter(r=>r.status===k).length);
  const tv=(cl.vendors||[]).length,cv=(cl.vendors||[]).filter(v=>v.confirmed).length,vpct=tv?Math.round(cv/tv*100):0;

  const pills=Object.entries(STATUS).filter(([k])=>counts[k]>0).map(([k,s])=>`
    <div class="pill" style="background:${s.bg};border:1px solid ${s.border}">
      <div class="pill-dot" style="background:${s.color}"></div>
      <span style="color:${s.color}">${counts[k]}</span>
      <span style="color:#555">${s.label}</span>
    </div>`).join('');

  const vpBar=tv>0?`<div class="card" style="margin-bottom:18px">
    <div class="flex flex-between mb-8"><span class="text-sm bold">Vendors confirmed</span><span class="text-sm bold" style="color:${vpct>=100?'#16a34a':vpct>=50?'#d97706':'#dc2626'}">${cv}/${tv}</span></div>
    <div class="progress-wrap"><div class="progress-bar" style="width:${vpct}%;background:${vpct>=100?'#16a34a':'#1C1C1C'}"></div></div>
    <div class="flex flex-between mt-10 text-xs text-gray"><span>${vpct}% locked in</span>${vpct>=100?'<span style="color:#16a34a;font-weight:700">All confirmed!</span>':'<span>'+(tv-cv)+' pending</span>'}</div>
  </div>`:'';

  const catsHtml=cats.length===0?`<div class="card" style="text-align:center;padding:48px"><div style="font-size:32px;margin-bottom:10px">📋</div><div class="serif-font" style="font-size:18px;color:#aaa;font-weight:300">No roadmap items yet</div></div>`:
  cats.map(cat=>`
    <div style="margin-bottom:18px">
      <div class="roadmap-cat serif-font">${cat}</div>
      ${visible.filter(r=>r.category===cat).map(r=>{const s=STATUS[r.status]||STATUS.pending;return `
        <div class="roadmap-item" style="border:1px solid ${s.border}">
          <div class="flex flex-gap" style="flex:1">
            <div class="pill-dot" style="background:${s.color};margin-top:5px;flex-shrink:0"></div>
            <div style="flex:1">
              <div style="font-weight:500;font-size:13px">${esc(r.item)}${isAdmin&&r.adminOnly?'<span style="font-size:9px;background:#f0f0ff;color:#7c3aed;padding:1px 6px;border-radius:5px;margin-left:6px">Admin</span>':''}</div>
              ${r.notes?`<div class="text-xs" style="color:#6A6A64;margin-top:2px;line-height:1.5">${esc(r.notes)}</div>`:''}
              ${r.dueDate?`<div class="text-xs text-gray" style="margin-top:2px">Due: ${fmtDate(r.dueDate)}</div>`:''}
            </div>
          </div>
          <div class="flex flex-gap" style="flex-shrink:0">
            <span class="pill text-xs" style="background:${s.bg};color:${s.color};border:1px solid ${s.border}">${s.label}</span>
            ${isAdmin?`<button class="btn-nude" data-action="edit-roadmap-item" data-id="${esc(r.id)}" style="color:#B5977A;font-size:14px;padding:0 2px">✎</button>
            <button class="btn-nude" data-action="del-roadmap-item" data-id="${esc(r.id)}" style="font-size:14px;padding:0 2px">✕</button>`:''}
          </div>
        </div>`}).join('')}
    </div>`).join('');

  return `
    <div class="section-head">
      <div>
        <h2 class="serif-font section-title">Roadmap</h2>
        <p class="section-sub">Track all vendors and milestones.</p>
      </div>
      ${isAdmin?`<button class="btn btn-dark btn-sm" data-action="add-roadmap-item">+ Add Item</button>`:''}
    </div>
    <div class="flex flex-gap flex-wrap mb-16">${pills}</div>
    ${vpBar}${catsHtml}`;
}

// ── VENDORS ───────────────────────────────────────────────────────────────────
function renderVendors(cl,isAdmin){
  const filter=STATE._vendorFilter||'All';
  const visible=isAdmin?(cl.vendors||[]):(cl.vendors||[]).filter(v=>!v.adminOnly);
  const filtered=filter==='All'?visible:visible.filter(v=>v.cat===filter);
  const activeCats=VCATS.filter(c=>visible.some(v=>v.cat===c));
  const grouped={};VCATS.forEach(cat=>{const items=filtered.filter(v=>v.cat===cat);if(items.length)grouped[cat]=items;});

  const filterBtns=['All',...activeCats].map(c=>`<button class="btn ${filter===c?'btn-dark':'btn-outline'} btn-sm" data-action="vendor-filter" data-cat="${esc(c)}">${c}</button>`).join('');

  const groups=Object.entries(grouped).map(([cat,vendors])=>`
    <div style="margin-bottom:22px">
      <div class="roadmap-cat serif-font">${cat}</div>
      <div class="vendor-grid">${vendors.map(v=>{const dc=(v.docs||[]).length;return `
        <div class="vendor-card">
          <div class="vendor-card-head" style="background:${v.confirmed?'#f0fdf4':'#fffbeb'}">
            <span style="font-weight:600;font-size:13px">${esc(v.name)}</span>
            <span class="text-xs bold" style="color:${v.confirmed?'#16a34a':'#d97706'};background:${v.confirmed?'#dcfce7':'#fef9c3'};padding:2px 8px;border-radius:7px">${v.confirmed?'Confirmed':'Pending'}</span>
          </div>
          <div style="padding:10px 14px">
            ${v.social?`<div style="margin-bottom:6px"><a href="${esc(v.social.startsWith('http')?v.social:'https://instagram.com/'+v.social.replace('@',''))}" target="_blank" style="display:inline-flex;align-items:center;gap:4px;font-size:12px;color:#6B6B64;text-decoration:none;background:#F5F5F2;padding:3px 10px;border-radius:14px;border:1px solid #E5E5E0">📸 ${esc(v.sType||'instagram')}</a></div>`:''}
            ${v.phone?`<div class="text-xs" style="margin-bottom:3px">📞 ${esc(v.phone)}</div>`:''}
            ${v.contact?`<div class="text-xs" style="margin-bottom:3px">👤 ${esc(v.contact)}</div>`:''}
            ${v.notes?`<div class="text-xs text-gray italic" style="border-top:1px solid #F5F5F2;padding-top:6px;margin-top:4px">${esc(v.notes)}</div>`:''}
            ${dc>0||isAdmin?`<button class="btn btn-outline btn-sm w-full" style="margin-top:8px;border-color:#B5977A;color:#B5977A" data-action="open-docs" data-id="${esc(v.id)}">📄 ${dc>0?dc+' doc'+(dc!==1?'s':''):'Documents & Quotes'}</button>`:''}
            ${isAdmin?`<div class="flex flex-gap mt-10">
              <button class="btn btn-outline btn-sm" style="flex:1" data-action="edit-vendor" data-id="${esc(v.id)}">Edit</button>
              <button class="btn btn-outline btn-sm" style="color:#dc2626;border-color:#fca5a5" data-action="del-vendor" data-id="${esc(v.id)}">✕</button>
            </div>`:''}
          </div>
        </div>`}).join('')}</div>
    </div>`).join('');

  return `
    <div class="section-head">
      <div><h2 class="serif-font section-title">Vendors</h2></div>
      ${isAdmin?`<div class="flex flex-gap">
        <button class="btn btn-outline btn-sm" data-action="open-library">📚 Library</button>
        <button class="btn btn-dark btn-sm" data-action="add-vendor">+ Add</button>
      </div>`:''}
    </div>
    <div class="flex flex-gap flex-wrap mb-16">${filterBtns}</div>
    ${visible.length===0?`<div class="card" style="text-align:center;padding:48px"><div style="font-size:32px;margin-bottom:10px">🏢</div><div class="serif-font" style="font-size:18px;color:#aaa;font-weight:300">No vendors yet</div></div>`:groups}`;
}

// ── SETUP ─────────────────────────────────────────────────────────────────────

  const setup=cl.setup||{vendorArrivals:[],areas:[]};
  const areasOrder=['Welcome / Rehearsal','Ceremony','Aperitif','Dinner','Dance'];

  const arrivalsHtml=(setup.vendorArrivals||[]).map(v=>isAdmin?
    `<div class="flex flex-gap flex-wrap" style="margin-bottom:6px">
      <input style="width:76px;flex-shrink:0" placeholder="10:30" value="${esc(v.time)}" data-input="arrival-time" data-id="${esc(v.id)}"/>
      <input style="flex:1;min-width:120px" placeholder="Vendor" value="${esc(v.vendor)}" data-input="arrival-vendor" data-id="${esc(v.id)}"/>
      <input style="flex:2;min-width:160px" placeholder="Notes..." value="${esc(v.notes)}" data-input="arrival-notes" data-id="${esc(v.id)}"/>
      <button class="btn-nude" data-action="del-arrival" data-id="${esc(v.id)}">✕</button>
    </div>`:
    `<div class="flex flex-gap" style="padding:7px 0;border-bottom:1px solid #F5F5F2">
      <span style="width:60px;color:#B5977A;font-weight:600;font-size:12px;flex-shrink:0">${esc(v.time)}</span>
      <span style="min-width:100px;font-size:12px;font-weight:500">${esc(v.vendor)}</span>
      <span class="text-xs text-gray">${esc(v.notes)}</span>
    </div>`).join('');

  const areasHtml=areasOrder.map(area=>{
    const items=(setup.areas||[]).filter(a=>a.area===area);
    return `<div class="card" style="margin-bottom:12px">
      <div class="flex flex-between mb-12">
        <h4 class="serif-font" style="font-size:15px;font-weight:400;padding-left:8px;border-left:2px solid #1C1C1C">${area}</h4>
        ${isAdmin?`<button class="btn btn-outline btn-sm" data-action="add-area-item" data-area="${esc(area)}">+</button>`:''}
      </div>
      ${items.length===0?`<p class="text-xs text-gray">No setup notes.</p>`:''}
      ${items.map(a=>isAdmin?
        `<div class="flex flex-gap" style="margin-bottom:5px">

          <input style="flex:1;font-size:11px" placeholder="Description..." value="${esc(a.notes)}" data-input="area-notes" data-id="${esc(a.id)}"/>
          <button class="btn-nude" data-action="del-area-item" data-id="${esc(a.id)}">✕</button>
        </div>`:
        `<div class="flex flex-gap" style="padding-bottom:4px;border-bottom:1px solid #F5F5F2">
          <span style="width:80px;color:#6A6A64;font-size:12px;font-weight:500;flex-shrink:0">${esc(a.vendor)}</span>
          <span style="font-size:12px">${esc(a.notes)}</span>
        </div>`).join('')}
    </div>`;}).join('');

  const igHandles=[['Bride','bride'],['Groom','groom'],['Wedding Planner','planner'],['Wedding Dress','dress'],['Suit','suit'],['Jewellery','jewellery'],['Venue','venue'],['Floral Design','florist'],['Stationery','stationery'],['AV Company','av'],['DJ','dj'],['Live Music','music'],['Photo','photo'],['Video','video'],['Content Creator','content']];

  return `
    <div class="section-head"><h2 class="serif-font section-title">Setup & Arrivals</h2></div>
    <div class="card mb-16">
      <div class="flex flex-between mb-12">
        <h3 class="serif-font" style="font-size:17px;font-weight:400">Vendor Arrival Times</h3>
        ${isAdmin?`<button class="btn btn-dark btn-sm" data-action="add-arrival">+ Add</button>`:''}
      </div>
      ${(setup.vendorArrivals||[]).length===0?`<p class="text-xs text-gray">No arrivals yet.</p>`:''}

    ${areasHtml}

            `<div style="font-size:12px;padding-top:3px;min-height:20px">${(cl.instagramHandles||{})[key]?`<a href="https://instagram.com/${esc(((cl.instagramHandles||{})[key]||'').replace('@',''))}" target="_blank" style="color:#B5977A;text-decoration:none">${esc((cl.instagramHandles||{})[key])}</a>`:'<span style="color:#ddd">—</span>'}</div>`}
          </div>`).join('')}
      </div>
    </div>`;
}

// ── RUNDOWN ───────────────────────────────────────────────────────────────────

  const rd=cl.rundown||{days:[]};
  const isHdr=a=>a&&a.startsWith('--');

    const col=STATE.collapsed&&STATE.collapsed[day.id];
    return `
      <div class="card" style="padding:0;overflow:hidden;margin-bottom:14px">

          <div class="flex flex-gap" style="flex:1">

            `<span style="font-size:15px;font-weight:500">${esc(day.label)}</span>`}
          </div>
          <div class="flex flex-gap" onclick="event.stopPropagation()">
            ${isAdmin?`<button class="btn btn-outline btn-sm" data-action="add-rundown-item" data-dayid="${esc(day.id)}">+ Line</button>
            <button class="btn-nude" data-action="del-day" data-id="${esc(day.id)}">✕</button>`:''}
            <span class="text-xs text-gray">${(day.items||[]).length}</span>
          </div>
        </div>
        ${col?'':renderDayItems(day,isAdmin)}
      </div>`;}).join('');

  return `
    <div class="section-head">
      <div><h2 class="serif-font section-title">Run Down</h2><p class="section-sub">Day-by-day schedule.</p></div>
      ${isAdmin?`<button class="btn btn-outline btn-sm" data-action="add-day">+ Add Day</button>`:''}
    </div>
    ${(rd.days||[]).length===0?`<div class="card" style="text-align:center;padding:48px;border:2px dashed #DEDED8;background:#F8F8F6">
      <div style="font-size:32px;margin-bottom:10px">📋</div>
      <div class="serif-font" style="font-size:18px;color:#aaa;font-weight:300">No schedule yet</div>
    </div>`:''}
    ${daysHtml}`;
}

function renderDayItems(day,isAdmin){
  const isHdr=a=>a&&a.startsWith('--');
  if(!isAdmin){
    return `<div style="padding:8px 18px 14px">${(day.items||[]).map(item=>isHdr(item.action)?
      `<div style="padding:12px 0 3px;border-top:1px solid #E5E5E0;margin-top:6px"><span style="font-size:10px;font-weight:700;color:#8A8A82;letter-spacing:.14em;text-transform:uppercase">${esc(item.action.replace(/--/g,'').trim())}</span></div>`:
      `<div class="flex flex-gap" style="padding:8px 0;border-bottom:1px solid #F8F8F8">
        <span style="width:60px;color:#B5977A;font-weight:600;font-size:12px;flex-shrink:0">${esc(item.time)}</span>
        ${item.who?`<span style="width:90px;color:#6A6A64;font-size:11px;flex-shrink:0;font-style:italic">${esc(item.who)}</span>`:''}
        <span style="font-size:12px;flex:1;line-height:1.4">${esc(item.action)}</span>
      </div>`).join('')}</div>`;
  }
  return `<div style="padding:8px 18px 14px">
    <div class="rd-header-grid"><span class="text-xs text-gray" style="font-weight:700;text-transform:uppercase;letter-spacing:.1em">Time</span><span class="text-xs text-gray" style="font-weight:700;text-transform:uppercase;letter-spacing:.1em">Who</span><span class="text-xs text-gray" style="font-weight:700;text-transform:uppercase;letter-spacing:.1em">Action</span><span></span></div>
    ${(day.items||[]).map((item,idx)=>`
      <div class="rd-grid" style="margin-bottom:3px;background:${isHdr(item.action)?'#F8F8F6':'transparent'};border-radius:${isHdr(item.action)?'5px':'0'};padding:${isHdr(item.action)?'2px 4px':'0'}">
        <input style="font-size:11px;padding:4px 7px;background:${isHdr(item.action)?'#F0F0EC':'#fff'}" placeholder="18:00" value="${esc(item.time)}" data-input="item-time" data-dayid="${esc(day.id)}" data-iid="${esc(item.id)}"/>
        <input style="font-size:11px;padding:4px 7px;background:${isHdr(item.action)?'#F0F0EC':'#fff'}" placeholder="JMB..." value="${esc(item.who)}" data-input="item-who" data-dayid="${esc(day.id)}" data-iid="${esc(item.id)}"/>
        <input style="font-size:11px;padding:4px 7px;background:${isHdr(item.action)?'#F0F0EC':'#fff'};font-weight:${isHdr(item.action)?700:400}" value="${esc(item.action)}" data-input="item-action" data-dayid="${esc(day.id)}" data-iid="${esc(item.id)}"/>
        <div class="flex flex-gap" style="gap:1px">
          <button style="background:none;border:none;cursor:${idx===0?'default':'pointer'};color:${idx===0?'#F0F0EC':'#aaa'};font-size:11px;padding:2px" data-action="move-item" data-dayid="${esc(day.id)}" data-iid="${esc(item.id)}" data-dir="-1">↑</button>
          <button style="background:none;border:none;cursor:${idx===(day.items||[]).length-1?'default':'pointer'};color:${idx===(day.items||[]).length-1?'#F0F0EC':'#aaa'};font-size:11px;padding:2px" data-action="move-item" data-dayid="${esc(day.id)}" data-iid="${esc(item.id)}" data-dir="1">↓</button>
          <button style="background:none;border:none;cursor:pointer;color:#ddd;font-size:12px;padding:2px" data-action="del-item" data-dayid="${esc(day.id)}" data-iid="${esc(item.id)}">✕</button>
        </div>
      </div>`).join('')}
  </div>`;
}

function renderDesign(cl,isAdmin){

  const zoneTabsHtml=DESIGN_ZONES.map(z=>`

      `<div style="font-size:12px;padding-top:3px;min-height:20px;font-style:${gv(az,f.key)?'normal':'italic'};color:${gv(az,f.key)?'#1C1C1C':'#ccc'}">${esc(gv(az,f.key))||'—'}</div>`}

  const partyFlorals=[['Bride Bouquet','brideBouquet'],["Bridesmaids' Bouquets",'bridesmaidsBouquet'],['Groom Boutonniere','groomBout'],['Groomsmen Boutonnieres','groomsmenBout'],['Flower Girls','flowerGirls'],['Page Boys','pageBoys'],["Parents' Flowers",'parentFlowers'],['Ring Box','ringBox']];

  return `
    <div class="section-head"><h2 class="serif-font section-title">Design</h2></div>
    <div class="card mb-16">
      <div class="flex flex-between mb-16"><h3 class="serif-font" style="font-size:16px;font-weight:400">Colour Palette</h3>${isAdmin?'<span class="text-xs text-gray">Click swatch to edit</span>':''}</div>
      <div class="flex flex-gap flex-wrap">
        ${paletteHtml}
        ${isAdmin?`<div style="text-align:center">
          <div class="text-xs text-gray mb-8" style="font-weight:700;text-transform:uppercase;letter-spacing:.1em">Add</div>
          <div class="flex flex-gap">
            <div style="position:relative;width:38px;height:38px;border-radius:7px;border:1.5px dashed #DEDED8;overflow:hidden;background:${STATE._newColor||'#B5977A'}">
              <input type="color" value="${STATE._newColor||'#B5977A'}" style="position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer" data-input="new-color"/>
            </div>
            <button class="btn btn-dark btn-sm" data-action="add-palette">+</button>
          </div>
        </div>`:''}
      </div>
    </div>
    <div class="card mb-16">
      <h3 class="serif-font mb-12" style="font-size:16px;font-weight:400">Style & Mood</h3>
      ${isAdmin?`<textarea placeholder="e.g. Elegant · Sophisticated · Classic with modern twist..." data-input="mood" style="min-height:50px">${esc(s.mood||'')}</textarea>`:
      `<p style="color:#6A6A64;font-size:13px;line-height:1.7;font-style:italic">${esc(s.mood)||'—'}</p>`}
    </div>
    <div class="card mb-16">
      <h3 class="serif-font mb-16" style="font-size:16px;font-weight:400">Wedding Party Florals</h3>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px">
        ${partyFlorals.map(([label,key])=>`
          <div>
            <label class="lbl">${label}</label>
            ${isAdmin?`<input value="${esc((s.partyFlorals||{})[key]||'')}" data-input="party-floral" data-key="${key}"/>`:
            `<div style="font-size:12px;padding-top:3px;min-height:20px">${esc((s.partyFlorals||{})[key])||'<span style="color:#ccc">—</span>'}</div>`}
          </div>`).join('')}
      </div>

    <div class="card" style="padding:0;overflow:hidden">

        <div class="text-xs text-gray mb-16" style="text-transform:uppercase;letter-spacing:.08em">${cz.icon} ${cz.label}</div>

          <label class="lbl">Notes</label>
          ${isAdmin?`<textarea placeholder="Additional notes..." data-input="zone-notes" data-zone="${az}" style="min-height:50px">${esc(gn(az))}</textarea>`:
          `<div style="font-size:12px;line-height:1.6;font-style:${gn(az)?'normal':'italic'};color:${gn(az)?'#1C1C1C':'#ccc'}">${esc(gn(az))||'—'}</div>`}
        </div>
      </div>
    </div>`;
}

// ── BUDGET ────────────────────────────────────────────────────────────────────
function renderPaymentsCell(d, sid, key, isAdmin){
  const payments = d.payments || [];
  const total = getPaymentsTotal(payments);
  const expanded = STATE._expandedPayments && STATE._expandedPayments[sid+key];

  if(!isAdmin){
    return `<span class="text-xs">${total>0?fmt(total):'—'}</span>`;
  }

  return `<div>
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
      <span style="font-size:12px;font-weight:${total>0?700:400};color:${total>0?'#1C1C1C':'#aaa'}">${total>0?fmt(total):'—'}</span>
      <button style="font-size:10px;color:#B5977A;background:none;border:1px solid #B5977A;border-radius:10px;padding:1px 7px;cursor:pointer;font-family:inherit"
        data-action="toggle-payments" data-sid="${sid}" data-key="${key}">
        ${payments.length>0?payments.length+' payment'+(payments.length>1?'s':''):''} + Add
      </button>
    </div>
    ${expanded?`<div style="margin-top:6px;background:#F8F8F6;border-radius:7px;padding:8px;border:1px solid #E5E5E0">
      ${payments.map((p,pi)=>`
        <div style="display:flex;gap:4px;align-items:center;margin-bottom:4px;flex-wrap:wrap">
          <input value="${esc(p.date||'')}" placeholder="Date" style="width:80px;font-size:11px;padding:3px 6px" data-input="payment-date" data-sid="${sid}" data-key="${key}" data-pi="${pi}"/>
          <input value="${esc(p.amount||'')}" placeholder="€" style="width:66px;font-size:11px;padding:3px 6px" data-input="payment-amount" data-sid="${sid}" data-key="${key}" data-pi="${pi}"/>
          <input value="${esc(p.note||'')}" placeholder="Note..." style="flex:1;min-width:60px;font-size:11px;padding:3px 6px" data-input="payment-note" data-sid="${sid}" data-key="${key}" data-pi="${pi}"/>
          <button style="background:none;border:none;cursor:pointer;color:#fca5a5;font-size:13px;padding:0 2px" data-action="del-payment" data-sid="${sid}" data-key="${key}" data-pi="${pi}">✕</button>
        </div>`).join('')}
      <button style="font-size:11px;color:#16a34a;background:#f0fdf4;border:1px solid #86efac;border-radius:6px;padding:3px 10px;cursor:pointer;font-family:inherit;margin-top:2px"
        data-action="add-payment" data-sid="${sid}" data-key="${key}">+ Add payment</button>
    </div>`:''}
  </div>`;
}

function renderBudget(cl,isAdmin){
  const bl=cl.budgetLines||{};
  const getL=(sid,key)=>(bl[sid]||{})[key]||{vendor:'',totalCost:'',paymentDetails:'',others:'',paymentsMade:'',pendingPayments:'',customLabel:''};
  const sT=sid=>Object.values(bl[sid]||{}).reduce((s,l)=>s+(parseFloat(l.totalCost)||0),0);
  const gC=BUDGET_SECTIONS.reduce((s,sec)=>s+sT(sec.id),0);
  const gP=BUDGET_SECTIONS.reduce((s,sec)=>s+Object.values(bl[sec.id]||{}).reduce((ss,l)=>ss+getPaymentsTotal(l.payments),0),0);
  const gPn=BUDGET_SECTIONS.reduce((s,sec)=>s+Object.values(bl[sec.id]||{}).reduce((ss,l)=>ss+(parseFloat(l.pendingPayments)||0),0),0);
  const pending=Math.max(0,(cl.budget||0)-(cl.budgetPaid||0));
  const pct=cl.budget?Math.round((cl.budgetPaid/cl.budget)*100):0;

  return `
    <div class="section-head">
      <div><h2 class="serif-font section-title">Budget</h2><p class="section-sub">Visible to team only.</p></div>
      ${isAdmin?`<button class="btn btn-outline btn-sm" data-action="edit-totals">Edit Totals</button>`:''}
    </div>
    <div class="stats-row" style="margin-bottom:16px">
      ${[['Total Budget',cl.budget,'#1C1C1C'],['Total Paid',cl.budgetPaid,'#16a34a'],['Pending',pending,'#dc2626']].map(([l,v,col])=>`
        <div class="stat-card" style="text-align:center">
          <div class="serif-font stat-val" style="color:${col}">${fmt(v)}</div>
          <div class="stat-label">${l}</div>
        </div>`).join('')}
    </div>
    <div class="card mb-12">
      <div class="flex flex-between mb-8"><span class="text-sm bold">Payment Progress</span><span class="text-sm bold" style="color:${pct>=100?'#16a34a':'#d97706'}">${pct}%</span></div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%;background:${pct>=100?'#16a34a':'#1C1C1C'}"></div></div>
    </div>
    <div class="card mb-16" style="background:#fffbeb;border-color:#fde68a">
      <p style="font-size:11px;color:#92400e;line-height:1.5">Prices are based on quotes received. Total costs will fluctuate depending on final choices and guest count.</p>
    </div>
    ${BUDGET_SECTIONS.map(section=>{const st=sT(section.id);return `
      <div class="card mb-14" style="padding:0;overflow:hidden">
        <div class="card-dark" style="border-radius:0;display:flex;justify-content:space-between;align-items:center">
          <span class="serif-font" style="font-size:16px;font-weight:400;color:#fff">${section.label}</span>
          ${st>0?`<span class="text-xs" style="color:#ccc">${fmt(st)}</span>`:''}
        </div>
        <div class="overflow-x"><table class="budget-table">
          <thead><tr>${['Service','Vendor','Total Cost','Payment Details','Others','Payments Made','Pending'].map(h=>`<th>${h}</th>`).join('')}</tr></thead>
          <tbody>
            ${section.lines.map((line,idx)=>{const key=line.key+idx;const d=getL(section.id,key);return `<tr>
              <td>${isAdmin?`<input value="${esc(d.customLabel||line.label)}" placeholder="Service..." style="width:120px" data-input="budget-field" data-sid="${section.id}" data-key="${key}" data-f="customLabel"/>`:
              `<span style="font-weight:500">${esc(d.customLabel||line.label||'—')}</span>`}</td>
              <td>${isAdmin?`<input value="${esc(d.vendor||'')}" style="width:110px" data-input="budget-field" data-sid="${section.id}" data-key="${key}" data-f="vendor"/>`:`<span class="text-xs">${esc(d.vendor)||"—"}</span>`}</td>
              <td>${isAdmin?`<input value="${esc(d.totalCost||'')}" style="width:76px" data-input="budget-field" data-sid="${section.id}" data-key="${key}" data-f="totalCost" placeholder="0.00"/>`:`<span class="text-xs">${fmt(parseFloat(d.totalCost)||0)}</span>`}</td>
              <td>${isAdmin?`<input value="${esc(d.paymentDetails||'')}" style="width:110px" data-input="budget-field" data-sid="${section.id}" data-key="${key}" data-f="paymentDetails"/>`:`<span class="text-xs">${esc(d.paymentDetails)||"—"}</span>`}</td>
              <td>${isAdmin?`<input value="${esc(d.others||'')}" style="width:80px" data-input="budget-field" data-sid="${section.id}" data-key="${key}" data-f="others"/>`:`<span class="text-xs">${esc(d.others)||"—"}</span>`}</td>
              <td style="min-width:140px">
                ${renderPaymentsCell(d, section.id, key, isAdmin)}
              </td>
              <td style="background:${parseFloat(d.pendingPayments||0)>0?'#fef2f2':'transparent'}"><span style="font-weight:700;color:${parseFloat(d.pendingPayments||0)>0?'#dc2626':'#aaa'};font-size:12px">${(()=>{const tot=parseFloat(d.totalCost||0);const paid=getPaymentsTotal(d.payments);const pend=Math.max(0,tot-paid);return pend>0?fmt(pend):'—';})()}</span></td>
            </tr>`;}).join('')}
            <tr style="background:#F8F8F6;border-top:2px solid #E5E5E0"><td colspan="3"><strong>TOTAL ${section.label.toUpperCase()}</strong></td><td colspan="4" style="text-align:right"><strong>${fmt(st)}</strong></td></tr>
          </tbody>
        </table></div>
      </div>`}).join('')}
    <div style="background:#1C1C1C;border-radius:10px;padding:16px 20px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;text-align:center">
      ${[['TOTAL COST',gC,'#fff'],['TOTAL PAID',gP,'#4ADE80'],['TOTAL PENDING',gPn,'#FCA5A5']].map(([l,v,col])=>`
        <div><div class="text-xs" style="color:#888;letter-spacing:.1em;margin-bottom:4px">${l}</div><div class="serif-font" style="font-size:clamp(16px,3vw,22px);color:${col}">${fmt(v)}</div></div>`).join('')}
    </div>`;
}

      ${STATE._imgData?`<img src="${STATE._imgData}" style="width:100%;border-radius:7px;margin-top:10px;max-height:160px;object-fit:cover;border:1px solid #E5E5E0"/>`:
       STATE._imgUrl?`<img src="${esc(STATE._imgUrl)}" style="width:100%;border-radius:7px;margin-top:10px;max-height:160px;object-fit:cover;border:1px solid #E5E5E0" onerror="this.style.display='none'"/>`:'' }
      <div class="flex flex-gap mt-16" style="justify-content:flex-end">
        <button class="btn btn-outline" data-action="modal-cancel">Cancel</button>
        <button class="btn btn-dark" data-action="save-image">Add</button>
      </div>`;
  }
  else if(m.type==='preview-image'){
    return `<div style="position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px" data-action="close-preview">
      <div style="max-width:900px;position:relative" onclick="event.stopPropagation()">
        <img src="${esc(m.src)}" alt="" style="max-width:100%;max-height:80vh;border-radius:8px;object-fit:contain;display:block"/>
        ${m.caption?`<div style="text-align:center;color:#ddd;font-size:13px;margin-top:8px;font-style:italic">${esc(m.caption)}</div>`:''}
        <button class="btn-nude" data-action="close-preview" style="position:absolute;top:-12px;right:-12px;background:rgba(255,255,255,.15);border-radius:50%;width:30px;height:30px;color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center">✕</button>
      </div>
    </div>`;
  }

  return `<div class="modal-overlay" onclick="if(event.target===this){document.dispatchEvent(new CustomEvent('close-modal'))}">
    <div class="modal-box ${wide}">
      <div class="modal-head">
        <span class="modal-title serif-font">${esc(m.title||'')}</span>
        <button class="modal-close" data-action="modal-cancel">✕</button>
      </div>
      <div class="modal-body">${body}</div>
    </div>
  </div>`;
}

// ── ACTION HANDLERS ───────────────────────────────────────────────────────────
function handleAction(action,data,e,el){
  const cl=getClient();

  // ── Auth ──
  if(action==='login-tab'){
    STATE._loginTab=data.tab;
    // Update tab buttons without clearing inputs
    document.querySelectorAll('.login-tab').forEach(btn=>{
      btn.classList.toggle('active', btn.dataset.tab===data.tab);
    });
    const ph=document.getElementById('lu');
    if(ph)ph.placeholder=data.tab==='team'?'anna · judit · admin':'couple username';
    STATE._loginErr='';
    const errDiv=document.querySelector('.login-error');
    if(errDiv)errDiv.remove();
    return;
  }
  if(action==='toggle-remember'){
    STATE._loginRemember=!STATE._loginRemember;
    const tog=document.getElementById('rem-toggle');
    const knob=tog&&tog.querySelector('.toggle-knob');
    if(tog){tog.style.background=STATE._loginRemember?'#1C1C1C':'#E5E5E0';}
    if(knob){knob.style.left=STATE._loginRemember?'20px':'2px';}
    return;
  }
  if(action==='login'){
    const tab=STATE._loginTab||'couple';
    const u=document.getElementById('lu')&&document.getElementById('lu').value.trim().toLowerCase()||'';
    const p=document.getElementById('lp')&&document.getElementById('lp').value||'';
    if(tab==='team'){
      const admin=STATE.admins.find(a=>a.username===u&&a.password===p);
      if(!admin){STATE._loginErr='Invalid credentials.';render();return;}
      STATE.session={role:admin.role,user:admin};
      STATE.view='dash';STATE._loginErr='';
      if(STATE._loginRemember)lsSet('session',{role:admin.role,uid:admin.id,pw:admin.password});
    } else {
      const couple=STATE.clients.find(c=>c.coupleUser===u&&c.couplePass===p);
      if(!couple){STATE._loginErr='Incorrect credentials.';render();return;}
      STATE.session={role:'couple',client:couple};
      STATE.view='client';STATE.activeClientId=couple.id;STATE.activeTab='roadmap';
      if(STATE._loginRemember)lsSet('session',{role:'couple',cid:couple.id,cu:couple.coupleUser});
    }
    render();return;
  }
  if(action==='logout'){STATE.session=null;STATE.view='login';STATE._loginErr='';lsSet('session',null);render();return;}

  // ── Navigation ──
  if(action==='go-back'){STATE.view=STATE.session.role==='couple'?'login':'dash';render();return;}
  if(action==='go-team'){STATE.view='team';render();return;}
  if(action==='open-client'){STATE.view='client';STATE.activeClientId=data.id;STATE.activeTab='roadmap';render();return;}
  if(action==='set-tab'){STATE.activeTab=data.tab;render();return;}
  if(action==='set-zone'){STATE.activeZone=data.zone;render();return;}

  // ── Modal ──
  if(action==='modal-cancel'||action==='overlay-close'){closeModal();STATE._addingDoc=false;STATE._docFile='';STATE._docFileData='';STATE._imgFile='';STATE._imgData='';STATE._imgUrl='';render();return;}
  if(action==='close-preview'){closeModal();render();return;}

  // ── Dashboard ──
  if(action==='toggle-archived'){STATE._showArchived=!STATE._showArchived;render();return;}
  if(action==='archive-client'){
    STATE.clients=STATE.clients.map(c=>c.id===data.id?{...c,archived:true}:c);
    saveClients();render();return;
  }
  if(action==='unarchive-client'){
    STATE.clients=STATE.clients.map(c=>c.id===data.id?{...c,archived:false}:c);
    saveClients();render();return;
  }
  if(action==='confirm-delete-client'){
    const c=STATE.clients.find(x=>x.id===data.id);
    if(!c)return;
    STATE.modal={type:'confirm-delete',title:'Delete Wedding',clientId:data.id,clientName:c.bride+' & '+c.groom};
    render();return;
  }
  if(action==='delete-client-confirm'){
    STATE.clients=STATE.clients.filter(c=>c.id!==data.id);
    saveClients();closeModal();render();return;
  }
  if(action==='new-client'){STATE.modal={type:'new-client',title:'New Client'};render();return;}
  if(action==='save-new-client'){
    const bride=document.getElementById('m-bride').value.trim();
    const groom=document.getElementById('m-groom').value.trim();
    const date=document.getElementById('m-date').value;
    if(!bride||!groom||!date)return;
    const slug=(bride+groom).toLowerCase().replace(/\s/g,'');
    const cu=document.getElementById('m-cuser').value.trim().toLowerCase()||slug;
    const cp=document.getElementById('m-cpass').value||bride.slice(0,3).toLowerCase()+new Date(date).getFullYear();
    const nc={
      id:uid(),bride,groom,date,
      venue:document.getElementById('m-venue').value,
      location:document.getElementById('m-location').value,
      guests:{adults:parseInt(document.getElementById('m-guests').value)||0},
      budget:parseFloat(document.getElementById('m-budget').value)||0,budgetPaid:0,
      leadId:document.getElementById('m-lead').value||null,collaboratorIds:[],
      coupleUser:cu,couplePass:cp,
      visibleTabs:['roadmap','vendors','design','moodboard','rundown'],hiddenRoadmapIds:[],
      style:{palette:['#1C1C1C','#F5F0E8','#B5977A'],mood:'',linen:'',chairs:'',glassware:'',cutlery:'',centerpiece:'',notes:''},
      designZones:{},moodboard:[],
      roadmap:JMB_ROADMAP_TEMPLATE.map((r,i)=>({...r,id:'r'+Date.now()+i})),
      vendors:[],
      rundown:{days:RUNDOWN_TEMPLATE.map(t=>({id:uid(),label:t.label,items:t.items.map(item=>({...item,id:uid()}))}))},
      setup:JSON.parse(JSON.stringify(SETUP_TEMPLATE)),
      inspection:{inspectionDates:'',weddingDay:'',whoAttending:'',hotel:'',visits:[]},
      family:{bride:[],groom:[]},instagramHandles:{},guestCounts:{},budgetLines:{},
    };
    STATE.clients=[...STATE.clients,nc];saveClients();closeModal();render();return;
  }

  // ── Roadmap ──
  if(action==='add-roadmap-item'){STATE.modal={type:'roadmap-item',title:'Add Item',item:{status:'pending'}};render();return;}
  if(action==='edit-roadmap-item'){const r=(cl.roadmap||[]).find(x=>x.id===data.id);STATE.modal={type:'roadmap-item',title:'Edit Item',item:r};render();return;}
  if(action==='save-roadmap-item'){
    const item={category:document.getElementById('m-cat').value,item:document.getElementById('m-item').value,status:document.getElementById('m-status').value,notes:document.getElementById('m-notes').value,dueDate:document.getElementById('m-due').value,adminOnly:document.getElementById('m-admin').checked};
    const id=STATE.modal.item&&STATE.modal.item.id;
    const upd=id?{...cl,roadmap:(cl.roadmap||[]).map(r=>r.id===id?{...r,...item}:r)}:{...cl,roadmap:[...(cl.roadmap||[]),{...item,id:uid()}]};
    updateClient(upd);closeModal();render();return;
  }
  if(action==='del-roadmap-item'){updateClient({...cl,roadmap:(cl.roadmap||[]).filter(r=>r.id!==data.id)});render();return;}

  // ── Vendors ──
  if(action==='vendor-filter'){STATE._vendorFilter=data.cat;render();return;}
  if(action==='add-vendor'){STATE.modal={type:'vendor',title:'Add Vendor',vendor:null};render();return;}
  if(action==='edit-vendor'){const v=(cl.vendors||[]).find(x=>x.id===data.id);STATE.modal={type:'vendor',title:'Edit Vendor',vendor:v};render();return;}
  if(action==='save-vendor'){
    const v={cat:document.getElementById('m-cat').value,name:document.getElementById('m-name').value,sType:(document.getElementById('m-stype').value||'instagram').toLowerCase(),social:document.getElementById('m-social').value,phone:document.getElementById('m-phone').value,contact:document.getElementById('m-contact').value,notes:document.getElementById('m-notes').value,confirmed:document.getElementById('m-conf').checked,adminOnly:document.getElementById('m-admin').checked,docs:[]};
    const id=STATE.modal.vendor&&STATE.modal.vendor.id;
    const upd=id?{...cl,vendors:(cl.vendors||[]).map(x=>x.id===id?{...x,...v,docs:x.docs||[]}:x)}:{...cl,vendors:[...(cl.vendors||[]),{...v,id:uid()}]};
    updateClient(upd);closeModal();render();return;
  }
  if(action==='del-vendor'){updateClient({...cl,vendors:(cl.vendors||[]).filter(v=>v.id!==data.id)});render();return;}
  if(action==='open-library'){STATE.modal={type:'library',title:'JMB Vendor Library',wide:true};render();return;}
  if(action==='add-from-library'){
    const v=JMB_LIBRARY[parseInt(data.idx)];
    updateClient({...cl,vendors:[...(cl.vendors||[]),{...v,id:uid(),confirmed:false,adminOnly:false,docs:[]}]});
    // Update just the button without closing modal
    const btn=document.querySelector('[data-action="add-from-library"][data-idx="'+data.idx+'"]');
    if(btn)btn.outerHTML='<span class="text-xs bold" style="color:#16a34a;background:#f0fdf4;padding:2px 8px;border-radius:7px">Added</span>';
    return;
  }
  if(action==='open-docs'){STATE.modal={type:'docs',title:'Documents & Quotes',vid:data.id,isAdmin:STATE.session.role!=='couple'};STATE._addingDoc=false;render();return;}
  if(action==='start-add-doc'){
    STATE._addingDoc=true;
    // Replace the button with the form without full render
    const btn=document.querySelector('[data-action="start-add-doc"]');
    if(btn){
      btn.outerHTML=`<div id="doc-form-area" style="background:#F8F8F6;border-radius:8px;border:1px solid #E5E5E0;padding:16px">
        <div class="field"><label class="lbl">TITLE</label><input id="doc-title" placeholder="Budget Pack A · Contract..."/></div>
        <div class="field"><label class="lbl">DESCRIPTION</label><textarea id="doc-desc" style="min-height:44px"></textarea></div>
        <div class="field"><label class="lbl">PRICE (€)</label><input id="doc-price"/></div>
        <div class="field"><label class="lbl">FILE</label><button class="btn btn-outline w-full" onclick="document.getElementById('doc-file-input').click()">📎 Choose file</button><input type="file" id="doc-file-input" accept="application/pdf,image/*" style="display:none" data-change="doc-file"/></div>
        <div class="flex flex-gap mt-12" style="justify-content:flex-end">
          <button class="btn btn-outline" data-action="cancel-doc">Cancel</button>
          <button class="btn btn-dark" data-action="save-doc" data-vid="${STATE.modal&&STATE.modal.vid||''}">Add</button>
        </div>
      </div>`;
    }
    return;
  }
  if(action==='cancel-doc'){STATE._addingDoc=false;const fa=document.getElementById('doc-form-area');if(fa)fa.outerHTML=`<button class="btn btn-dark w-full" style="padding:10px" data-action="start-add-doc">+ Add Document / Quote</button>`;return;}
  if(action==='save-doc'){
    const t=document.getElementById('doc-title').value;if(!t)return;
    const doc={id:uid(),title:t,description:document.getElementById('doc-desc').value,price:document.getElementById('doc-price').value,fileName:STATE._docFile||'',fileData:STATE._docFileData||'',chosen:false};
    const upd={...cl,vendors:(cl.vendors||[]).map(v=>v.id===data.vid?{...v,docs:[...(v.docs||[]),doc]}:v)};
    updateClient(upd);STATE._addingDoc=false;STATE._docFile='';STATE._docFileData='';
    STATE.modal={...STATE.modal};render();return;
  }
  if(action==='toggle-chosen'){
    const upd={...cl,vendors:(cl.vendors||[]).map(v=>v.id===data.vid?{...v,docs:(v.docs||[]).map(d=>({...d,chosen:d.id===data.did?!d.chosen:false}))}:v)};
    updateClient(upd);
    // Re-render modal content only
    const mb=document.querySelector('.modal-body');
    if(mb&&STATE.modal){const tmp=document.createElement('div');tmp.innerHTML=renderModal();const newMb=tmp.querySelector('.modal-body');if(newMb)mb.innerHTML=newMb.innerHTML;}
    return;
  }
  if(action==='del-doc'){
    const upd={...cl,vendors:(cl.vendors||[]).map(v=>v.id===data.vid?{...v,docs:(v.docs||[]).filter(d=>d.id!==data.did)}:v)};
    updateClient(upd);render();return;
  }

  // ── Setup ──
  if(action==='add-arrival'){
    const upd={...cl,setup:{...cl.setup,vendorArrivals:[...(cl.setup.vendorArrivals||[]),{id:uid(),time:'',vendor:'',notes:''}]}};
    updateClient(upd);render();return;
  }
  if(action==='del-arrival'){const upd={...cl,setup:{...cl.setup,vendorArrivals:(cl.setup.vendorArrivals||[]).filter(v=>v.id!==data.id)}};updateClient(upd);render();return;}
  if(action==='add-area-item'){const upd={...cl,setup:{...cl.setup,areas:[...(cl.setup.areas||[]),{id:uid(),area:data.area,vendor:'',notes:''}]}};updateClient(upd);render();return;}
  if(action==='del-area-item'){const upd={...cl,setup:{...cl.setup,areas:(cl.setup.areas||[]).filter(a=>a.id!==data.id)}};updateClient(upd);render();return;}

  // ── Rundown ──
  if(action==='toggle-day'){STATE.collapsed={...STATE.collapsed,[data.id]:!STATE.collapsed[data.id]};render();return;}
  if(action==='add-day'){STATE.modal={type:'add-day',title:'Add Day'};render();return;}
  if(action==='save-day'){const label=document.getElementById('m-label').value.trim();if(!label)return;const upd={...cl,rundown:{...cl.rundown,days:[...(cl.rundown.days||[]),{id:uid(),label,items:[]}]}};updateClient(upd);closeModal();render();return;}
  if(action==='del-day'){const upd={...cl,rundown:{...cl.rundown,days:(cl.rundown.days||[]).filter(d=>d.id!==data.id)}};updateClient(upd);render();return;}
  if(action==='add-rundown-item'){const upd={...cl,rundown:{...cl.rundown,days:(cl.rundown.days||[]).map(d=>d.id===data.dayid?{...d,items:[...(d.items||[]),{id:uid(),time:'',who:'',action:''}]}:d)}};updateClient(upd);render();return;}
  if(action==='del-item'){const upd={...cl,rundown:{...cl.rundown,days:(cl.rundown.days||[]).map(d=>d.id===data.dayid?{...d,items:(d.items||[]).filter(i=>i.id!==data.iid)}:d)}};updateClient(upd);render();return;}
  if(action==='move-item'){
    const dir=parseInt(data.dir);
    const upd={...cl,rundown:{...cl.rundown,days:(cl.rundown.days||[]).map(d=>{if(d.id!==data.dayid)return d;const ni=[...d.items];const idx=ni.findIndex(i=>i.id===data.iid);const sw=idx+dir;if(sw<0||sw>=ni.length)return d;const tmp=ni[idx];ni[idx]=ni[sw];ni[sw]=tmp;return {...d,items:ni};})}};
    updateClient(upd);render();return;
  }

  // ── Design ──
  if(action==='del-palette'){const s=cl.style||{};const upd={...cl,style:{...s,palette:(s.palette||[]).filter((_,i)=>i!==parseInt(data.idx))}};updateClient(upd);render();return;}
  if(action==='add-palette'){const s=cl.style||{};const upd={...cl,style:{...s,palette:[...(s.palette||[]),STATE._newColor||'#B5977A']}};updateClient(upd);render();return;}

  // ── Moodboard ──
  if(action==='add-image'){STATE.modal={type:'add-image',title:'Add Image'};STATE._imgData='';STATE._imgUrl='';STATE._imgFile='';render();return;}
  if(action==='save-image'){
    const src=STATE._imgData||(document.getElementById('m-url')&&document.getElementById('m-url').value)||'';
    if(!src)return;
    const cap=document.getElementById('m-caption')&&document.getElementById('m-caption').value||'';
    updateClient({...cl,moodboard:[...(cl.moodboard||[]),{id:uid(),src,caption:cap}]});
    closeModal();STATE._imgData='';STATE._imgUrl='';STATE._imgFile='';render();return;
  }
  if(action==='del-image'){updateClient({...cl,moodboard:(cl.moodboard||[]).filter(x=>x.id!==data.id)});render();return;}
  if(action==='preview-image'){const img=(cl.moodboard||[]).find(x=>x.id===data.id);if(img)STATE.modal={type:'preview-image',src:img.src,caption:img.caption};render();return;}

  // ── Budget ──
  if(action==='toggle-payments'){
    if(!STATE._expandedPayments)STATE._expandedPayments={};
    const k=data.sid+data.key;
    STATE._expandedPayments[k]=!STATE._expandedPayments[k];
    render();return;
  }
  if(action==='add-payment'){
    const bl={...cl.budgetLines};
    const sec=bl[data.sid]||{};
    const line={...(sec[data.key]||{})};
    line.payments=[...(line.payments||[]),{date:'',amount:'',note:''}];
    bl[data.sid]={...sec,[data.key]:line};
    if(!STATE._expandedPayments)STATE._expandedPayments={};
    STATE._expandedPayments[data.sid+data.key]=true;
    updateClient({...cl,budgetLines:bl});render();return;
  }
  if(action==='del-payment'){
    const bl={...cl.budgetLines};
    const sec=bl[data.sid]||{};
    const line={...(sec[data.key]||{})};
    const pi=parseInt(data.pi);
    line.payments=(line.payments||[]).filter((_,i)=>i!==pi);
    const tot=parseFloat(line.totalCost||0);
    const paid=getPaymentsTotal(line.payments);
    line.pendingPayments=Math.max(0,tot-paid)>0?Math.max(0,tot-paid).toFixed(2):'';
    bl[data.sid]={...sec,[data.key]:line};
    updateClient({...cl,budgetLines:bl});render();return;
  }
  if(action==='edit-totals'){STATE.modal={type:'edit-totals',title:'Edit Budget Totals'};render();return;}
  if(action==='save-totals'){const upd={...cl,budget:parseFloat(document.getElementById('m-budget').value)||0,budgetPaid:parseFloat(document.getElementById('m-paid').value)||0};updateClient(upd);closeModal();render();return;}

  // ── Family ──
  if(action==='add-family'){STATE.modal={type:'add-family',title:'Add Family Member',side:data.side};render();return;}
  if(action==='save-family'){const n=document.getElementById('m-name').value.trim();if(!n)return;const f={id:uid(),name:n,relation:document.getElementById('m-rel').value,notes:document.getElementById('m-notes').value};const upd={...cl,family:{...cl.family,[data.side]:[...(cl.family[data.side]||[]),f]}};updateClient(upd);closeModal();render();return;}
  if(action==='del-family'){const upd={...cl,family:{...cl.family,[data.side]:(cl.family[data.side]||[]).filter(f=>f.id!==data.id)}};updateClient(upd);render();return;}

  // ── Inspection ──
  if(action==='add-visit'){const upd={...cl,inspection:{...(cl.inspection||{}),visits:[...((cl.inspection||{}).visits||[]),{id:uid(),type:'Venue Visit',date:'',time:'',venue:'',address:'',notes:''}]}};updateClient(upd);render();return;}
  if(action==='del-visit'){const upd={...cl,inspection:{...(cl.inspection||{}),visits:((cl.inspection||{}).visits||[]).filter(v=>v.id!==data.id)}};updateClient(upd);render();return;}

  // ── Team ──
  if(action==='add-member'){STATE._memberRole='planner';STATE.modal={type:'add-member',title:'Add Team Member'};render();return;}
  if(action==='set-role'){
    STATE._memberRole=data.role;
    document.querySelectorAll('[data-action="set-role"]').forEach(btn=>{
      btn.className='btn '+(btn.dataset.role===data.role?'btn-dark':'btn-outline');
      btn.style.flex='1';
    });
    return;
  }
  if(action==='save-member'){const n=document.getElementById('m-name').value.trim();const u=document.getElementById('m-user').value.trim().toLowerCase();const p=document.getElementById('m-pass').value;if(!n||!u||!p)return;STATE.admins=[...STATE.admins,{id:uid(),name:n,username:u,password:p,role:STATE._memberRole||'planner'}];saveAdmins();closeModal();render();return;}
  if(action==='del-member'){STATE.admins=STATE.admins.filter(a=>a.id!==data.id);saveAdmins();render();return;}
  if(action==='manage-access'){const c=STATE.clients.find(x=>x.id===data.id);STATE._modalAccess={...c};STATE.modal={type:'access',title:c.bride+' & '+c.groom+' — Access',cid:data.id,wide:true};render();return;}
  if(action==='acc-lead'){
    STATE._modalAccess={...STATE._modalAccess,leadId:data.id||null};
    // Update buttons without full render
    document.querySelectorAll('[data-action="acc-lead"]').forEach(btn=>{
      const isActive=btn.dataset.id===(STATE._modalAccess.leadId||'');
      btn.className='btn '+(isActive?'btn-dark':'btn-outline')+' btn-sm flex flex-gap';
      btn.style.alignItems='center';
    });
    return;
  }
  if(action==='acc-tab'){
    const tabs=STATE._modalAccess.visibleTabs||[];
    const has=tabs.includes(data.tab);
    STATE._modalAccess={...STATE._modalAccess,visibleTabs:has?tabs.filter(t=>t!==data.tab):[...tabs,data.tab]};
    document.querySelectorAll('[data-action="acc-tab"]').forEach(btn=>{
      const isActive=(STATE._modalAccess.visibleTabs||[]).includes(btn.dataset.tab);
      btn.className='btn '+(isActive?'btn-dark':'btn-outline')+' btn-sm';
    });
    return;
  }
  if(action==='save-access'){
    const acc=STATE._modalAccess;const cu=document.getElementById('acc-user').value.toLowerCase();const cp=document.getElementById('acc-pass').value;
    const upd={...STATE.clients.find(x=>x.id===data.cid),...acc,coupleUser:cu,couplePass:cp};
    STATE.clients=STATE.clients.map(c=>c.id===data.cid?upd:c);saveClients();closeModal();render();return;
  }
}

function handleInput(type,el,e){
  const cl=getClient();
  if(!cl)return;

  if(type==='arrival-time'||type==='arrival-vendor'||type==='arrival-notes'){
    const f=type.split('-')[1];
    const upd={...cl,setup:{...cl.setup,vendorArrivals:(cl.setup.vendorArrivals||[]).map(v=>v.id===el.dataset.id?{...v,[f]:el.value}:v)}};
    updateClient(upd);return;
  }
  if(type==='area-vendor'||type==='area-notes'){
    const f=type.split('-')[1];
    const upd={...cl,setup:{...cl.setup,areas:(cl.setup.areas||[]).map(a=>a.id===el.dataset.id?{...a,[f]:el.value}:a)}};
    updateClient(upd);return;
  }
  if(type==='ig-handle'){
    const upd={...cl,instagramHandles:{...(cl.instagramHandles||{}),[el.dataset.key]:el.value}};
    updateClient(upd);return;
  }
  if(type==='day-label'){
    const upd={...cl,rundown:{...cl.rundown,days:(cl.rundown.days||[]).map(d=>d.id===el.dataset.id?{...d,label:el.value}:d)}};
    updateClient(upd);return;
  }
  if(type==='item-time'||type==='item-who'||type==='item-action'){
    const f=type.split('-')[1];
    const upd={...cl,rundown:{...cl.rundown,days:(cl.rundown.days||[]).map(d=>d.id===el.dataset.dayid?{...d,items:(d.items||[]).map(i=>i.id===el.dataset.iid?{...i,[f]:el.value}:i)}:d)}};
    updateClient(upd);return;
  }
  if(type==='palette-color'){
    const s=cl.style||{};const p=[...(s.palette||[])];p[parseInt(el.dataset.idx)]=el.value;
    updateClient({...cl,style:{...s,palette:p}});return;
  }
  if(type==='new-color'){STATE._newColor=el.value;return;}
  if(type==='mood'){updateClient({...cl,style:{...(cl.style||{}),mood:el.value}});return;}
  if(type==='zone-field'){
    const zones={...cl.designZones};const z=zones[el.dataset.zone]||{};zones[el.dataset.zone]={...z,fields:{...(z.fields||{}),[el.dataset.key]:el.value}};
    updateClient({...cl,designZones:zones});return;
  }
  if(type==='zone-notes'){
    const zones={...cl.designZones};zones[el.dataset.zone]={...(zones[el.dataset.zone]||{}),notes:el.value};
    updateClient({...cl,designZones:zones});return;
  }
  if(type==='party-floral'){
    const s=cl.style||{};updateClient({...cl,style:{...s,partyFlorals:{...(s.partyFlorals||{}),[el.dataset.key]:el.value}}});return;
  }
  if(type==='budget-field'){
    const bl={...cl.budgetLines};
    const sec=bl[el.dataset.sid]||{};
    const line={...(sec[el.dataset.key]||{})};
    line[el.dataset.f]=el.value;
    if(el.dataset.f==='totalCost'){
      const tot=parseFloat(el.value)||0;
      const paid=getPaymentsTotal(line.payments);
      const pend=Math.max(0,tot-paid);
      line.pendingPayments=pend>0?pend.toFixed(2):'';
    }
    bl[el.dataset.sid]={...sec,[el.dataset.key]:line};
    updateClient({...cl,budgetLines:bl});return;
  }
  if(type==='payment-date'||type==='payment-amount'||type==='payment-note'){
    const f=type.split('-')[1];
    const bl={...cl.budgetLines};
    const sec=bl[el.dataset.sid]||{};
    const line={...(sec[el.dataset.key]||{})};
    const pi=parseInt(el.dataset.pi);
    const payments=[...(line.payments||[])];
    payments[pi]={...payments[pi],[f]:el.value};
    line.payments=payments;
    const tot=parseFloat(line.totalCost||0);
    const paid=getPaymentsTotal(payments);
    line.pendingPayments=Math.max(0,tot-paid)>0?Math.max(0,tot-paid).toFixed(2):'';
    bl[el.dataset.sid]={...sec,[el.dataset.key]:line};
    updateClient({...cl,budgetLines:bl});return;
  }
  if(type==='inspection-field'){
    updateClient({...cl,inspection:{...(cl.inspection||{}),[el.dataset.key]:el.value}});return;
  }
  if(type==='visit-type'||type==='visit-date'||type==='visit-time'||type==='visit-venue'||type==='visit-address'||type==='visit-notes'){
    const f=type.split('-')[1];
    const ins=cl.inspection||{};
    updateClient({...cl,inspection:{...ins,visits:(ins.visits||[]).map(v=>v.id===el.dataset.id?{...v,[f]:el.value}:v)}});return;
  }
  // m-url: read on save
}

function handleChange(type,el,e){
  if(type==='img-file'){
    const f=el.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{STATE._imgData=ev.target.result;STATE._imgFile=f.name;render();};r.readAsDataURL(f);
    return;
  }
  if(type==='doc-file'){
    const f=el.files[0];if(!f)return;
    const r=new FileReader();r.onload=ev=>{STATE._docFileData=ev.target.result;STATE._docFile=f.name;render();};r.readAsDataURL(f);
    return;
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
if(_fbReady) _setupFirebaseListeners();
(function(){
  const dbg=document.getElementById('debug-msg');
  if(dbg)dbg.textContent='JS loaded v3.0 - rendering...';
  try{
    render();
    if(dbg)dbg.textContent='';
  }catch(e){
    if(dbg)dbg.textContent='Error: '+e.message;
    console.error('render() failed:',e);
    // Show error on screen
    const app=document.getElementById('app');
    if(app)app.innerHTML='<div style="padding:40px;font-family:sans-serif;max-width:500px;margin:0 auto"><h2 style="color:#1C1C1C;margin-bottom:12px">Just Married Barcelona</h2><div style="color:#dc2626;font-size:13px;margin-bottom:8px">Error: '+e.message+'</div><pre style="font-size:10px;color:#888;white-space:pre-wrap">'+String(e.stack).slice(0,400)+'</pre></div>';
  }
})();
</script>
