// db — reads/writes to Firebase, falls back to localStorage while offline
const db = {
  get: async k => {
    // localStorage first — instant, works offline and locally
    try{ const v=localStorage.getItem('jmb_'+k); if(v){ const p=JSON.parse(v); if(p) return p; } }catch(e){}
    // No local data — try Firebase with 3s timeout
    if(firebaseDB){
      try{
        const result = await Promise.race([
          firebaseDB.ref('jmb/'+k).once('value').then(s=>s.val()),
          new Promise((_,rej)=>setTimeout(()=>rej('timeout'),3000))
        ]);
        if(result) try{localStorage.setItem('jmb_'+k,JSON.stringify(result));}catch(e){}
        return result;
      }catch(e){ console.warn('Firebase get failed:',e); }
    }
    return null;
  },
  set: async (k,v) => {
    // Save locally first — always works
    try{ localStorage.setItem('jmb_'+k,JSON.stringify(v)); }catch(e){}
    // Sync to Firebase in background
    if(firebaseDB) try{ firebaseDB.ref('jmb/'+k).set(v); }catch(e){}
  },
  listen: (k,cb) => {
    if(firebaseDB) firebaseDB.ref('jmb/'+k).on('value',s=>{ const v=s.val(); if(v) cb(v); });
  }
};

// ── APP ───────────────────────────────────────────────────────────────────────
function App(){
  const [loading,setLoading]=useState(true);
  const [admins,setAdmins]=useState([]);
  const [clients,setClients]=useState([]);
  const [session,setSession]=useState(null);
  useEffect(()=>{
    (async()=>{
      let a=await db.get('admins');if(!a||!a.length){a=DEF_ADMINS;await db.set('admins',a);}
      let c=await db.get('clients');if(!c||!c.length){c=[DEF_CLIENT];await db.set('clients',c);}
      setAdmins(a);setClients(c);
      try{const sv=JSON.parse(localStorage.getItem('jmb_session')||'null');if(sv){if(sv.role==='owner'||sv.role==='planner'){const u=a.find(x=>x.id===sv.userId&&x.password===sv.pw);if(u)setSession({role:u.role,user:u,userId:u.id,pw:u.password});}else if(sv.role==='couple'){const cl=c.find(x=>x.id===sv.clientId&&x.coupleUser===sv.coupleUser);if(cl)setSession({role:'couple',client:cl,clientId:cl.id,coupleUser:cl.coupleUser});}}}catch(e){}
      setLoading(false);
      db.listen('admins',val=>{if(val)setAdmins(val);});
      db.listen('clients',val=>{if(val)setClients(val);});
    })();
  },[]);
  const saveA=async a=>{setAdmins(a);await db.set('admins',a);};
  const saveC=async c=>{setClients(c);await db.set('clients',c);};
  const upClient=async u=>{const arr=clients.map(c=>c.id===u.id?u:c);await saveC(arr);if(session&&session.role==='couple'&&session.client.id===u.id)setSession(s=>({...s,client:u}));};
  const login=(sess,rem)=>{setSession(sess);try{rem?localStorage.setItem('jmb_session',JSON.stringify(sess)):localStorage.removeItem('jmb_session');}catch(e){}};
  const logout=()=>{setSession(null);try{localStorage.removeItem('jmb_session');}catch(e){}};
  if(loading)return h('div',{style:{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#fff'}},h('div',{style:{fontFamily:"'Great Vibes',cursive",fontSize:44,color:'#1C1C1C',marginBottom:6}},'Just Married'),h('div',{style:{fontSize:10,color:'#aaa',letterSpacing:'0.28em',textTransform:'uppercase',marginBottom:32}},'Barcelona'),h('div',{style:{width:36,height:36,border:'2px solid #E5E5E0',borderTopColor:'#1C1C1C',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}));
  if(!session)return h(Login,{admins,clients,onLogin:login});
  if(session.role==='couple')return h(CoupleApp,{session,onLogout:logout,onUpdate:upClient});
  const myC=session.role==='owner'?clients:clients.filter(c=>c.leadId===session.user.id||(c.collaboratorIds||[]).includes(session.user.id));
  return h(AdminApp,{session,admins,myClients:myC,allClients:clients,onLogout:logout,onSaveAdmins:saveA,onSaveClients:saveC,onUpdate:upClient});
}
